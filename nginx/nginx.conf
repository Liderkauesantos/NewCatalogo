server {
    listen 80;
    server_name newcatalogo.com.br www.newcatalogo.com.br localhost;

    # Redireciona tudo para HTTPS (descomentar quando tiver SSL)
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    # Proxy para o PostgREST
    location /api/ {
        proxy_pass         http://postgrest:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Repassa headers de schema do PostgREST
        proxy_pass_header  Content-Profile;
        proxy_pass_header  Accept-Profile;
    }

    # SPA React — qualquer rota (incluindo /casarossi, /castor etc.) cai no index.html
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root       /usr/share/nginx/html;
        expires    30d;
        add_header Cache-Control "public, immutable";
    }
}
