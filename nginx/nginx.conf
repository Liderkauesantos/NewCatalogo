server {
    listen 80;
    server_name newcatalogo.com.br www.newcatalogo.com.br localhost;

    # Redireciona tudo para HTTPS (descomentar quando tiver SSL)
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    # Proxy para o PostgREST (API do banco)
    location /api/ {
        proxy_pass         http://postgrest:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Repassa headers de schema do PostgREST
        proxy_pass_header  Content-Profile;
        proxy_pass_header  Accept-Profile;
    }

    # Proxy para o R2 Service (upload de imagens)
    location /api/r2/ {
        proxy_pass         http://r2-service:3001/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # Timeout maior para uploads
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # SPA React — qualquer rota (incluindo /casarossi, /castor etc.) cai no index.html
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root       /usr/share/nginx/html;
        expires    30d;
        add_header Cache-Control "public, immutable";
    }

    # PWA - Service Worker e Manifest não devem ser cacheados
    location ~* (sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        root       /usr/share/nginx/html;
        expires    -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
