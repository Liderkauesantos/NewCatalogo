services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: new_catalogo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
      - ./sql/02-jwt.sql:/docker-entrypoint-initdb.d/02-jwt.sql
      - ./sql/03-master-schema.sql:/docker-entrypoint-initdb.d/03-master-schema.sql
      - ./sql/04-roles.sql:/docker-entrypoint-initdb.d/04-roles.sql
      - ./sql/05-init-authenticator-password.sh:/docker-entrypoint-initdb.d/05-init-authenticator-password.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d new_catalogo" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.0.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${AUTHENTICATOR_PASSWORD}@postgres:5432/new_catalogo
      PGRST_DB_SCHEMAS: casarossi,demo,lojateste,master
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_PRE_REQUEST: master.set_tenant_schema
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_EXTRA_SEARCH_PATH: master,public
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: ""
      PGRST_OPENAPI_MODE: ignore-privileges
      PGRST_APP_SETTINGS_APP_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"

  # Serviço de upload R2
  r2-service:
    build: ./r2-service
    restart: unless-stopped
    environment:
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      PORT: 3001
    ports:
      - "3001:3001"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - postgrest
      - r2-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
